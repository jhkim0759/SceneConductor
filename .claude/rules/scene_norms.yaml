# scene_norms.yaml
# Automated scene evaluator norms — all distances in meters (m), heights in meters,
# angles in degrees, lux in lux, color temp in Kelvin.
# Tolerance field means "acceptable deviation from typical" (soft band).
# hard_min / hard_max = code/standard absolute limits; null = not specified.
#
# Lifted from research notes on indoor scene norms.
# Sources cited per entry. Used by scene-diagnoser (P0 hard-violation check)
# and Realism-Critic prompt (soft-band recommendations).

# ─────────────────────────────────────────────
# 1. DESK + CHAIR
# ─────────────────────────────────────────────
desk_chair:
  seat_height_m:
    min: 0.38
    typical: 0.44
    max: 0.54
    hard_min: 0.36
    hard_max: null
    tolerance: 0.03
    source: "ANSI/HFES 100-2007 §5"

  desk_height_m:
    min: 0.63
    typical: 0.72
    max: 0.80
    hard_min: 0.63
    hard_max: null
    tolerance: 0.02
    source: "ANSI/HFES 100-2007 §5; Neufert Architects' Data 4th ed."

  desk_minus_seat_delta_m:
    min: 0.22
    typical: 0.27
    max: 0.32
    hard_min: null
    hard_max: null
    tolerance: 0.03
    source: "ANSI/HFES 100-2007; general ergonomics"

  knee_clearance_floor_to_underside_m:
    min: 0.64
    typical: 0.68
    max: null
    hard_min: 0.64
    hard_max: null
    tolerance: 0.03
    source: "ANSI/HFES 100-2007 §5 (knee clearance)"

  thigh_clearance_seat_to_underside_m:
    min: 0.16
    typical: 0.20
    max: null
    hard_min: 0.16
    hard_max: null
    tolerance: 0.02
    source: "ANSI/HFES 100-2007 §5"

  leg_depth_clearance_m:
    min: 0.46
    typical: 0.55
    max: null
    hard_min: 0.46
    hard_max: null
    tolerance: 0.05
    source: "ANSI/HFES 100-2007 §5"

  tucked_distance_chair_front_to_desk_edge_m:
    # negative = chair front edge is behind (inside) desk edge
    min: -0.05
    typical: 0.00
    max: 0.05
    hard_min: null
    hard_max: null
    tolerance: 0.05
    source: "General ergonomics practice"

  in_use_distance_chair_front_to_desk_edge_m:
    min: 0.15
    typical: 0.20
    max: 0.30
    hard_min: null
    hard_max: null
    tolerance: 0.05
